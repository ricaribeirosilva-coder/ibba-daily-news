<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBBA Financial Daily News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #08090C; color: #E0E0E0; line-height: 1.6; }

        .header { background: #111318; border-bottom: 1px solid #1E2129; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #EC7000, #FF8C1A, #EC7000); }
        .header { position: relative; overflow: hidden; }
        .header-left { display: flex; align-items: center; gap: 12px; z-index: 1; }
        .logo { width: 36px; height: 36px; background: linear-gradient(135deg, #EC7000, #D35F00); border-radius: 8px; }
        .header-title h1 { font-size: 1.15rem; font-weight: 700; color: #FFF; }
        .badges { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .badge { background: #181B22; padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem; color: #999; border: 1px solid #2A2E35; }

        .tabs-container { background: #111318; border-bottom: 1px solid #1E2129; padding: 0 2rem; display: flex; gap: 2rem; }
        .tab-btn { padding: 0.9rem 0; background: none; border: none; color: #666; cursor: pointer; font-size: 0.9rem; font-weight: 600; border-bottom: 2px solid transparent; font-family: inherit; }
        .tab-btn.active { color: #EC7000; border-bottom-color: #EC7000; }
        .tab-btn:hover { color: #AAA; }

        .tab-content { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }
        .tab-content.active { display: block; }

        .section-title { font-size: 1rem; font-weight: 700; color: #FFF; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 2px solid #EC7000; display: flex; align-items: center; gap: 0.5rem; }
        .section-title .count { font-size: 0.75rem; background: #EC7000; color: #FFF; padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 600; }
        .news-section { margin-bottom: 2rem; }

        .card { background: #111318; border: 1px solid #1E2129; border-radius: 8px; padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; transition: border-color 0.2s; }
        .card:hover { border-color: #333; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
        .card-headline { font-size: 0.95rem; font-weight: 600; flex: 1; }
        .card-headline a { color: #EC7000; text-decoration: none; }
        .card-headline a:hover { color: #FF8C1A; }
        .card-meta { font-size: 0.8rem; color: #777; margin-top: 0.4rem; }
        .tickers { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }
        .ticker { background: #181B22; padding: 0.2rem 0.55rem; border-radius: 4px; font-size: 0.7rem; color: #EC7000; border: 1px solid #2A2E35; font-weight: 600; }
        .expand-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 0.85rem; padding: 0.2rem; transition: color 0.2s; flex-shrink: 0; }
        .expand-btn:hover { color: #EC7000; }
        .summary { display: none; background: #0D0E12; padding: 0.75rem; border-radius: 6px; margin-top: 0.6rem; font-size: 0.85rem; color: #AAA; border-left: 3px solid #EC7000; line-height: 1.7; }
        .summary.open { display: block; }

        .tier-b-toggle { background: none; border: none; color: #EC7000; cursor: pointer; font-size: 0.9rem; font-weight: 700; padding: 0; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; font-family: inherit; }
        .tier-b-toggle:hover { color: #FF8C1A; }
        .tier-b-content { display: none; }
        .tier-b-content.open { display: block; }
        .region-badge { display: inline-block; background: #181B22; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; color: #888; border: 1px solid #2A2E35; margin-left: 0.5rem; }

        .wa-container { max-width: 560px; margin: 0 auto; }
        .wa-preview { background: #1A1A1A; border: 1px solid #1E2129; border-radius: 12px; padding: 1.5rem; font-size: 0.85rem; line-height: 1.9; color: #E0E0E0; font-family: 'Courier New', monospace; white-space: pre-wrap; word-wrap: break-word; margin-bottom: 1.25rem; max-height: 70vh; overflow-y: auto; }
        .copy-btn { width: 100%; padding: 0.9rem; background: #EC7000; border: none; border-radius: 8px; color: #FFF; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .copy-btn:hover { background: #FF8C1A; }
        .copy-ok { display: none; text-align: center; color: #22C55E; font-size: 0.85rem; margin-top: 0.6rem; }
        .copy-ok.show { display: block; }

        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .header-title h1 { font-size: 1rem; }
            .tabs-container { padding: 0 1rem; gap: 1rem; }
            .tab-content { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo"></div>
            <div class="header-title"><h1>IBBA Financial Daily News</h1></div>
        </div>
        <div class="badges">
            <div class="badge" id="dateBadge"></div>
            <div class="badge" id="newsBadge"></div>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('curadoria',this)">Curadoria</button>
        <button class="tab-btn" onclick="switchTab('whatsapp',this)">WhatsApp</button>
    </div>

    <div id="curadoria" class="tab-content active">
        <div class="news-section"><h2 class="section-title">Brasil <span class="count" id="brCount"></span></h2><div id="brCards"></div></div>
        <div class="news-section"><h2 class="section-title">Global <span class="count" id="glCount"></span></h2><div id="glCards"></div></div>
        <div class="news-section">
            <button class="tier-b-toggle" onclick="toggleTierB()"><span id="tbIcon">&#9654;</span> Tier B <span class="count" id="tbCount"></span></button>
            <div id="tbContent" class="tier-b-content"><div id="tbCards"></div></div>
        </div>
    </div>

    <div id="whatsapp" class="tab-content">
        <div class="wa-container">
            <div class="wa-preview" id="waPreview"></div>
            <button class="copy-btn" onclick="copyWA()">Copiar</button>
            <div class="copy-ok" id="copyOk">Copiado!</div>
        </div>
    </div>

<script>
var EMBEDDED_DATA = {
    date: "2026-03-30",
    classA_brazil: [
        { headline: "Banco Central mantém Selic em 10,5% e sinaliza cautela com inflação de serviços", url: "https://valor.globo.com/financas/noticia/2026/03/30/bc-mantem-selic.ghtml", source: "Valor Econômico", pub_date: "2026-03-30", tickers: ["Itaú", "Bradesco", "Banco do Brasil", "Banrisul"], summary: "O Copom decidiu manter a taxa Selic em 10,5% ao ano, em linha com as expectativas do mercado. O comunicado destacou preocupação com a inflação de serviços e sinalizou que novas altas não estão descartadas caso o cenário inflacionário se deteriore. Para os bancos, a manutenção da taxa em patamar elevado sustenta spreads de crédito, mas pode pressionar inadimplência no médio prazo." },
        { headline: "BTG Pactual avança em wealth management e atinge R$800bi sob gestão", url: "https://braziljournal.com/btg-wealth-800bi", source: "Brazil Journal", pub_date: "2026-03-29", tickers: ["BTG Pactual"], summary: "O BTG Pactual atingiu a marca de R$800 bilhões em ativos sob gestão na divisão de wealth management, consolidando sua posição como maior plataforma de investimentos do país. O crescimento foi puxado pela captação líquida de R$45 bilhões no trimestre, com destaque para o segmento de alta renda. A diversificação de receitas reduz dependência do investment banking." },
        { headline: "Nubank lança conta PJ para MEIs e micro empresas com cashback", url: "https://finsidersbrasil.com.br/nubank-conta-pj-mei", source: "Finsiders", pub_date: "2026-03-30", tickers: ["Nubank", "Stone", "PagBank"], summary: "O Nubank anunciou o lançamento de conta PJ focada em MEIs e microempresas, com cashback em compras e sem tarifa de manutenção. A iniciativa intensifica a competição com Stone e PagBank no segmento de pequenas empresas. Analistas estimam que o TAM de MEIs no Brasil ultrapassa 15 milhões de potenciais clientes." }
    ],
    classA_global: [
        { headline: "Fed signals extended pause as inflation remains above target", url: "https://reuters.com/fed-extended-pause-march-2026", source: "Reuters", pub_date: "2026-03-30", tickers: ["BBVA", "Credicorp", "Banco de Chile"], summary: "The Federal Reserve signaled it will maintain current rates for longer as PCE inflation remains at 2.8%, above the 2% target. Chair Powell emphasized patience, noting the labor market remains tight. The extended pause has implications for LatAm central banks, which may also delay easing cycles." },
        { headline: "BBVA completes $12bn acquisition of Banco Sabadell", url: "https://ft.com/bbva-sabadell-completion", source: "Financial Times", pub_date: "2026-03-29", tickers: ["BBVA"], summary: "BBVA has completed its $12 billion acquisition of Banco Sabadell after receiving final regulatory approval from the ECB. The deal creates Europe's second-largest bank by market cap. Integration synergies are expected to generate €900M in annual cost savings by 2028." }
    ],
    classB: [
        { headline: "CVM analisa novas regras para ETFs de criptoativos no Brasil", url: "https://infomoney.com.br/cvm-etfs-cripto", source: "Infomoney", pub_date: "2026-03-27", region: "brazil", tickers: ["B3", "XP Inc"], summary: "A CVM abriu consulta pública para regulamentar ETFs de criptoativos, o que pode ampliar o volume negociado na B3." },
        { headline: "Credicorp reports record quarterly profits in Peru", url: "https://latinfinance.com/credicorp-q1-profits", source: "Latin Finance", pub_date: "2026-03-27", region: "global", tickers: ["Credicorp"], summary: "Credicorp's Q1 results beat estimates driven by strong loan growth and improved asset quality in Peru." }
    ]
};

function init() {
    var d = EMBEDDED_DATA;
    // Date badge
    var dt = new Date(d.date + 'T12:00:00');
    var months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    document.getElementById('dateBadge').textContent = dt.getDate() + ' ' + months[dt.getMonth()] + ' ' + dt.getFullYear();
    // News count
    var total = d.classA_brazil.length + d.classA_global.length + d.classB.length;
    document.getElementById('newsBadge').textContent = total + ' notícias';
    document.getElementById('brCount').textContent = d.classA_brazil.length;
    document.getElementById('glCount').textContent = d.classA_global.length;
    document.getElementById('tbCount').textContent = d.classB.length;
    // Render
    document.getElementById('brCards').innerHTML = d.classA_brazil.map(function(item, i) { return card(item, 'br-' + i); }).join('');
    document.getElementById('glCards').innerHTML = d.classA_global.map(function(item, i) { return card(item, 'gl-' + i); }).join('');
    document.getElementById('tbCards').innerHTML = d.classB.map(function(item, i) { return cardB(item, 'tb-' + i); }).join('');
    // WhatsApp
    var wa = '*IBBA Financial Daily News*\n\n\n> Brazil\n\n';
    d.classA_brazil.forEach(function(item) { wa += '- *' + item.headline + '*\n' + item.url + '\n\n'; });
    wa += '\n> Global\n\n';
    d.classA_global.forEach(function(item) { wa += '- *' + item.headline + '*\n' + item.url + '\n\n'; });
    document.getElementById('waPreview').textContent = wa.trim();
}

function card(item, id) {
    var tks = item.tickers && item.tickers.length ? '<div class="tickers">' + item.tickers.map(function(t) { return '<span class="ticker">' + esc(t) + '</span>'; }).join('') + '</div>' : '';
    return '<div class="card"><div class="card-top"><h3 class="card-headline"><a href="' + esc(item.url) + '" target="_blank">' + esc(item.headline) + '</a></h3><button class="expand-btn" onclick="toggle(\'' + id + '\')">&#9660;</button></div><div class="card-meta">' + esc(item.source) + ' &bull; ' + esc(item.pub_date) + '</div>' + tks + '<div class="summary" id="' + id + '">' + esc(item.summary || '') + '</div></div>';
}

function cardB(item, id) {
    var tks = item.tickers && item.tickers.length ? '<div class="tickers">' + item.tickers.map(function(t) { return '<span class="ticker">' + esc(t) + '</span>'; }).join('') + '</div>' : '';
    var reg = item.region ? '<span class="region-badge">' + esc(item.region) + '</span>' : '';
    return '<div class="card"><div class="card-top"><h3 class="card-headline"><a href="' + esc(item.url) + '" target="_blank">' + esc(item.headline) + '</a>' + reg + '</h3><button class="expand-btn" onclick="toggle(\'' + id + '\')">&#9660;</button></div><div class="card-meta">' + esc(item.source) + ' &bull; ' + esc(item.pub_date) + '</div>' + tks + '<div class="summary" id="' + id + '">' + esc(item.summary || '') + '</div></div>';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toggle(id) { document.getElementById(id).classList.toggle('open'); }

function toggleTierB() {
    var c = document.getElementById('tbContent');
    c.classList.toggle('open');
    document.getElementById('tbIcon').innerHTML = c.classList.contains('open') ? '&#9660;' : '&#9654;';
}

function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
    document.getElementById(name).classList.add('active');
    btn.classList.add('active');
}

function copyWA() {
    var text = document.getElementById('waPreview').textContent;
    navigator.clipboard.writeText(text).then(function() {
        var ok = document.getElementById('copyOk');
        ok.classList.add('show');
        setTimeout(function() { ok.classList.remove('show'); }, 2000);
    });
}

init();
</script>
</body>
</html>
